name: Dokončit web před spuštěním
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/finalize-launch-trigger.txt'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: read
jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Dokončit SEO, navigaci, právní stránky a kalendář
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/finalize_launch.py
          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime
          import json,re,unicodedata
          from difflib import SequenceMatcher

          ROOT=Path.cwd();p=ROOT/'data/events.json'
          if p.exists():
            data=json.loads(p.read_text(encoding='utf-8'));events=data.get('events',[])
            def norm(v):
              v=unicodedata.normalize('NFKD',str(v or '')).encode('ascii','ignore').decode().lower()
              return re.sub(r'[^a-z0-9]+',' ',v).strip()
            def generic(e):
              u=str(e.get('source','')).lower().rstrip('/')
              return '/redakce/index.php' in u or '/cely-program' in u or u.endswith('/akce/mesto-kadan') or u.endswith('/kultura')
            direct=[e for e in events if not generic(e)]
            kept=[]
            for e in events:
              if not generic(e):kept.append(e);continue
              duplicate=False
              for d in direct:
                if str(e.get('start',''))[:10]!=str(d.get('start',''))[:10]:continue
                if SequenceMatcher(None,norm(e.get('title')),norm(d.get('title'))).ratio()>=0.38:duplicate=True;break
              if not duplicate:kept.append(e)
            unique={}
            for e in kept:
              key=(norm(e.get('title')),str(e.get('start',''))[:16],norm(e.get('place')))
              old=unique.get(key)
              if old is None or (generic(old) and not generic(e)):unique[key]=e
            data['events']=sorted(unique.values(),key=lambda x:str(x.get('start','')))
            p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
            print('Akce:',len(events),'->',len(data['events']))
          PY
      - name: Uložit finální balík do main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'nasekadan-launch-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Bez změn.'
          else
            git commit -m 'Dokončit Naše Kadaň před veřejným spuštěním'
            git push origin HEAD:main
          fi
