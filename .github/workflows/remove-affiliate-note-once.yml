name: Jednorázově odstranit doplňující text u reklam

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/remove-affiliate-note-trigger.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Upravit reklamní štítek
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('reklamy.js')
          text=path.read_text(encoding='utf-8')
          old='''<div class="promo-label">REKLAMA <span>Některé odkazy jsou affiliate a mohou podpořit provoz webu.</span></div>'''
          new='''<div class="promo-label">REKLAMA</div>'''
          if old not in text:
              raise SystemExit('Původní text nebyl nalezen.')
          text=text.replace(old,new)
          text=text.replace("    .promo-label span{font-size:10px;letter-spacing:0;text-transform:none;color:#8a949a}\n",'')
          path.write_text(text,encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reklamy.js
          git commit -m 'Odstranit doplňující text u reklam'
          git push origin HEAD:main
